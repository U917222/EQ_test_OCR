name = "cheq-eqtest"
compatibility_date = "2026-06-23"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "CHEQ_DB"
database_name = "cheq-eqtest-db"
database_id = "35c9160a-f3d2-46e7-9426-5999b5cadf20"
migrations_dir = "./migrations"

# scoring-api が保存した採点用紙原本を、認証済みの /files/r2/* から配信する。
# バケットは非公開のまま運用する。
[[r2_buckets]]
binding = "CHEQ_FILES"
bucket_name = "cheq-eqtest-files"

# OCR(採点表の数字読取)を有効にする場合は OCR_API_URL を設定する。未設定なら OCR はスキップされ
# 全セル手入力になる。OCR_API_KEY は専用 Bearer トークンで Pages secret として設定する。
# OCR_API_URL = "https://ocr-api-xxxxxxxx-an.a.run.app/recognize-sync"  (OCR_API_KEY is a Pages secret)
[vars]
# 結果PDFは D1 経路から Cloud Run の専用 /render-pdf(Bearer 認証)へ委譲する。
# PDF_RENDER_URL = "https://scoring-api-q4drl4qqmq-an.a.run.app/render-pdf"  (PDF_RENDER_KEY is a Pages secret)
