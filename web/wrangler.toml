pages_build_output_dir = "dist"

[[d1_databases]]
binding = "CHEQ_DB"
database_name = "cheq-eqtest-db"
database_id = "35c9160a-f3d2-46e7-9426-5999b5cadf20"

# Cloud Run の scoring-api(/api) へ委譲するためのカットオーバー設定。
